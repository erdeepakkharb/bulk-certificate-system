name: Bulk Generate PDF Certificates
on:
  workflow_dispatch:

jobs:
  bulk_convert:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Graphics Libraries and PDF Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 shared-mime-info
          python -m pip install --upgrade pip
          pip install weasyprint

      - name: Process Multi-Column CSV and Generate Certificates
        run: |
          python -c "
          import csv
          import os
          import re
          from weasyprint import HTML

          if not os.path.exists('students.csv'):
              raise FileNotFoundError('CRITICAL ERROR: could not find \"students.csv\". Please verify the filename.')

          os.makedirs('generated_certificates', exist_ok=True)

          with open('index.html', 'r', encoding='utf-8') as f:
              template_content = f.read()

          with open('students.csv', mode='r', encoding='utf-8-sig') as file:
              reader = csv.DictReader(file)
              reader.fieldnames = [f.strip().lower() for f in reader.fieldnames] if reader.fieldnames else []
              
              if 'name' not in reader.fieldnames or 'department' not in reader.fieldnames:
                  raise KeyError(f'CRITICAL ERROR: CSV columns must be named \"Name\" and \"Department\". Found: {reader.fieldnames}')

              for index, row in enumerate(reader, start=1):
                  student_name = row['name'].strip()
                  dept_name = row['department'].strip()
                  
                  if not student_name:
                      continue
                  
                  print(f'Processing Line {index}: {student_name} | {dept_name}')
                  
                  # Replace layout placeholders
                  personalized_html = template_content.replace('NAME_PLACEHOLDER', student_name)
                  personalized_html = personalized_html.replace('DEPARTMENT_PLACEHOLDER', dept_name)
                  
                  # SANITIZATION: Remove characters that break file paths (/, \, ?, *, :, etc.)
                  safe_filename = re.sub(r'[\\/*?:\'\"<>|]', '_', student_name)
                  
                  temp_html_path = f'temp_{index}.html'
                  with open(temp_html_path, 'w', encoding='utf-8') as temp_file:
                      temp_file.write(personalized_html)
                  
                  # Use the safe, sanitized name for the PDF output filename
                  pdf_filename = f'generated_certificates/{safe_filename}_Certificate.pdf'
                  
                  try:
                      HTML(temp_html_path).write_pdf(pdf_filename)
                  except Exception as e:
                      print(f'Failed to generate PDF for {student_name} due to error: {e}')
                  finally:
                      if os.path.exists(temp_html_path):
                          os.remove(temp_html_path)
          "

      - name: Deliver All Certificates as a Single Zip Bundle
        uses: actions/upload-artifact@v4
        with:
          name: "Bulk-Student-Certificates"
          path: generated_certificates/
          retention-days: 7
